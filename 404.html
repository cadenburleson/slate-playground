<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — Slate Playground</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script
    src="https://byheadless.com/s.js"
    data-site-id="2952483c-5617-4a93-9fa8-0543eeff61d5"
    defer
  ></script>
  <script>(function(){try{var s=document.querySelector("script[data-site-id]");var t=s&&s.getAttribute("data-site-id");if(!t)return;var r=localStorage.getItem("slate_manifest_"+t);if(!r)return;var m=JSON.parse(r);if(!m||!m.slugs)return;var p=location.pathname;for(var i=0;i<m.slugs.length;i++)if(m.slugs[i].slug===p){document.documentElement.style.visibility="hidden";return}}catch(e){}})()</script>
</head>
<body>

<header role="banner">
  <nav class="nav">
    <a class="brand" href="/">
      <span class="brand-mark">S</span>
      Slate Playground
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/blog/">Blog</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </div>
  </nav>
</header>

<main>
  <section class="hero" style="text-align:center;">
    <div class="wrap">
      <p class="eyebrow">404</p>
      <h1>We couldn't find that page.</h1>
      <p class="lede" style="margin-left:auto;margin-right:auto;">
        If you just created this page in the Slate app, give it a moment —
        the snippet will try to render it once the manifest refreshes.
      </p>
      <div class="cta-row" style="justify-content:center;">
        <a class="btn btn--primary" href="/">Back home</a>
      </div>
    </div>
  </section>
</main>

<footer role="contentinfo">
  <div class="footer-inner">
    <div>© 2026 Slate Playground</div>
    <div><a href="/about">About</a> · <a href="/contact">Contact</a></div>
  </div>
</footer>

</body>
</html>
